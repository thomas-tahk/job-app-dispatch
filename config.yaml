schedule:
  # Standard cron expression. Examples:
  #   "0 7 * * *"    — daily at 7 AM
  #   "0 9 * * 1"    — every Monday at 9 AM
  #   "0 8 * * 1,4"  — Monday and Thursday at 8 AM
  cron: "0 7 * * *"

