<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Cover Letter — {{.Application.Job.Title}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 2rem; }
    .container { max-width: 760px; }
    h1 { font-size: 1.2rem; margin-bottom: 0.25rem; }
    .subtitle { color: #555; font-size: 0.9rem; margin-bottom: 1.5rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.4rem; }
    textarea {
      width: 100%;
      min-height: 420px;
      font-family: Georgia, serif;
      font-size: 0.95rem;
      line-height: 1.65;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 1rem;
      resize: vertical;
    }
    .actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
    .btn { padding: 8px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
    .btn-save { background: #2d7d46; color: #fff; }
    .btn-save:hover { background: #246038; }
    .btn-back { background: #e8e8e8; color: #333; text-decoration: none; display: inline-flex; align-items: center; }
    .btn-back:hover { background: #d0d0d0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>{{.Application.Job.Title}} — {{.Application.Job.Company}}</h1>
    <p class="subtitle">Review and edit the AI-generated cover letter before approving submission.</p>

    <form method="POST" action="/jobs/{{.Application.JobID}}/cover">
      <label for="cover_letter">Cover Letter</label>
      <textarea id="cover_letter" name="cover_letter">{{.Application.CoverLetter}}</textarea>
      <div class="actions">
        <button class="btn btn-save" type="submit">Save</button>
        <a class="btn btn-back" href="/">Back to Digest</a>
      </div>
    </form>
  </div>
</body>
</html>
