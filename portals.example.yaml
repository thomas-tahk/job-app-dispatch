# Company portal configuration.
# Copy this file to portals.yaml and add the companies you want to track.
# portals.yaml is gitignored — it's your personal company list.
#
# Supported ATS platforms: greenhouse, ashby, lever
#
# The "slug" is the board identifier used in the ATS API URL:
#   Greenhouse: https://boards-api.greenhouse.io/v1/boards/{slug}/jobs
#   Ashby:      https://api.ashbyhq.com/posting-api/job-board/{slug}
#   Lever:      https://api.lever.co/v0/postings/{slug}
#
# To find a slug: go to the company's careers page, check the URL or page source
# for the ATS embed. For Greenhouse it's usually the company name in lowercase.
# Verify slugs return data before adding them.

companies:

  # ── Greenhouse ──────────────────────────────────────────────────────────────
